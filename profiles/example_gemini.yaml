# Example profile using Gemini (free tier)
# Usage: export GEMINI_API_KEY=your-key
#        python -m universal_debug_agent test -p profiles/example_gemini.yaml -s "your test scenario"

project:
  name: "My App (Gemini)"
  description: "Example project using Gemini as the LLM"

model:
  provider: "gemini"
  model_name: "gemini-2.0-flash"
  # api_key_env: "GEMINI_API_KEY"  # auto-detected for gemini provider

environment:
  type: "web"
  base_url: "https://staging.example.com"

auth:
  method: "none"

memory:
  enabled: true
  path: "./memory/{project_name}.jsonl"
  max_entries_in_prompt: 20

code:
  root_dir: "/path/to/your/project"

mcp_servers:
  playwright:
    enabled: true
    command: "npx"
    args: ["@playwright/mcp@latest"]
    cwd: "./artifacts/playwright"
    cache_tools_list: true
    client_session_timeout_seconds: 15

boundaries:
  readonly: true
  max_steps: 40
  max_turns: 20
  stuck_budget_ratio: 0.85
