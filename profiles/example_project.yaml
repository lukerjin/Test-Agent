project:
  name: "Example E-commerce App"
  description: "A sample e-commerce platform for demonstrating the debug agent"

environment:
  type: "web"
  base_url: "https://staging.example.com"
  start_command: "npm run dev"
  health_check_url: "/api/health"

auth:
  method: "form"
  login_url: "/login"
  test_accounts:
    - role: "admin"
      username_env: "TEST_ADMIN_USER"
      password_env: "TEST_ADMIN_PASS"
    - role: "user"
      username_env: "TEST_USER_USER"
      password_env: "TEST_USER_PASS"

# --- LLM Configuration ---
# Uncomment ONE of the following blocks:

# Option 1: OpenAI (default)
model:
  provider: "openai"
  model_name: "gpt-4o"
  # api_key_env: "OPENAI_API_KEY"  # default, auto-detected

# Option 2: Gemini (free tier available)
# model:
#   provider: "gemini"
#   model_name: "gemini-2.0-flash"
#   api_key_env: "GEMINI_API_KEY"

# Option 3: DeepSeek
# model:
#   provider: "deepseek"
#   model_name: "deepseek-chat"
#   api_key_env: "DEEPSEEK_API_KEY"

# Option 4: Any OpenAI-compatible API
# model:
#   provider: "custom"
#   model_name: "your-model-name"
#   base_url: "https://your-api.example.com/v1"
#   api_key_env: "YOUR_API_KEY"

# --- Memory ---
memory:
  enabled: true
  path: "./memory/{project_name}.jsonl"   # auto-creates, per-project file
  max_entries_in_prompt: 20               # inject last N records into prompt

code:
  root_dir: "/path/to/your/project"
  branch: "main"
  entry_dirs:
    - "src/pages"
    - "src/api"
    - "src/components"
  config_files:
    - ".env.staging"
    - "src/config/features.ts"

mcp_servers:
  playwright:
    enabled: true
    command: "npx"
    args: ["@anthropic-ai/mcp-playwright"]
  database:
    enabled: true
    command: "node"
    args: ["./mcp-servers/db-mcp/index.js"]
    env:
      DB_TYPE: "mysql"
      DB_HOST_ENV: "DB_HOST"
      DB_PORT_ENV: "DB_PORT"
      DB_USER_ENV: "DB_USER"
      DB_PASSWORD_ENV: "DB_PASSWORD"
      DB_NAME_ENV: "DB_NAME"

boundaries:
  readonly: true
  forbidden_actions:
    - "DELETE FROM"
    - "DROP TABLE"
    - "INSERT INTO"
    - "UPDATE"
  max_steps: 30
  allowed_domains:
    - "staging.example.com"
