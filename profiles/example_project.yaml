project:
  name: "Example E-commerce App"
  description: "A sample e-commerce platform for demonstrating the test agent"

environment:
  type: "web"
  base_url: "https://staging.example.com"
  start_command: "npm run dev"
  health_check_url: "/api/health"

auth:
  method: "form"
  login_url: "/login"
  test_accounts:
    - role: "admin"
      username_env: "TEST_ADMIN_USER"
      password_env: "TEST_ADMIN_PASS"
    - role: "user"
      username_env: "TEST_USER_USER"
      password_env: "TEST_USER_PASS"

# --- LLM Configuration ---
# Uncomment ONE of the following blocks:

# Option 1: OpenAI (default)
model:
  provider: "openai"
  model_name: "gpt-5.4-nano"
  # api_key_env: "OPENAI_API_KEY"  # default, auto-detected

# Option 2: Gemini (free tier available)
# model:
#   provider: "gemini"
#   model_name: "gemini-2.0-flash"
#   api_key_env: "GEMINI_API_KEY"

# Option 3: DeepSeek
# model:
#   provider: "deepseek"
#   model_name: "deepseek-chat"
#   api_key_env: "DEEPSEEK_API_KEY"

# Option 4: Any OpenAI-compatible API
# model:
#   provider: "custom"
#   model_name: "your-model-name"
#   base_url: "https://your-api.example.com/v1"
#   api_key_env: "YOUR_API_KEY"

# --- Memory ---
memory:
  enabled: false
  path: "./memory/{project_name}.jsonl" # auto-creates, per-project file
  max_entries_in_prompt: 2 # inject last N records into prompt

code:
  root_dir: "/path/to/your/project"
  branch: "main"
  entry_dirs:
    - "src/pages"
    - "src/api"
    - "src/components"
  config_files:
    - ".env.staging"
    - "src/config/features.ts"

mcp_servers:
  playwright:
    enabled: true
    command: "npx"
    args:
      [
        "@playwright/mcp@latest",
        "--browser",
        "chromium",
        "--timeout-action",
        "15000",
        "--ignore-https-errors",
      ]
    cwd: "./artifacts/playwright"
    cache_tools_list: true
    client_session_timeout_seconds: 15
    allowed_tools:
      - browser_navigate
      - browser_snapshot
      - browser_click
      - browser_type
      - browser_fill_form
      - browser_select_option
      - browser_press_key
      - browser_handle_dialog
      - browser_wait_for
      - browser_take_screenshot
      - browser_network_requests
  database:
    enabled: true
    role: database
    command: "node"
    args: ["./path/to/your/db-mcp/index.js"]
    cache_tools_list: true
    blocked_tools:
      - describe_all_tables
    env:
      DB_HOST_ENV: "DB_HOST"
      DB_PORT_ENV: "DB_PORT"
      DB_USER_ENV: "DB_USER"
      DB_PASSWORD_ENV: "DB_PASSWORD"

boundaries:
  readonly: true
  forbidden_actions:
    - "DELETE FROM"
    - "DROP TABLE"
    - "INSERT INTO"
    - "UPDATE"
  max_steps: 40
  max_turns: 20
  stuck_budget_ratio: 0.85
  allowed_domains:
    - "staging.example.com"

scenarios:
  test: "testing workflow"
